
# Root logger: set to DEBUG so debug() calls are recorded. Writes to FILE and CONSOLE.
log4j.rootLogger=DEBUG, FILE, CONSOLE

# Console appender
log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender
log4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout
log4j.appender.CONSOLE.layout.ConversionPattern=%d{ISO8601} %-5p [%t] %c - %m%n

# Rolling file appender (writes to the application.log under test resources)
log4j.appender.FILE=org.apache.log4j.RollingFileAppender
log4j.appender.FILE.File=${user.dir}/src/test/resources/com/ab/logs/application.log
log4j.appender.FILE.MaxFileSize=5MB
log4j.appender.FILE.MaxBackupIndex=3
log4j.appender.FILE.Append=false
log4j.appender.FILE.layout=org.apache.log4j.PatternLayout
log4j.appender.FILE.layout.ConversionPattern=%d{ISO8601} %-5p [%t] %c - %m%n

# Reduce noise from Selenium internals
log4j.logger.org.openqa.selenium=WARN
